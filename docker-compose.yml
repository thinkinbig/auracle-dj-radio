services:

  # ── Vector DB (mem0 OSS persistence) ─────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.18.2
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Fastify API + DJ logic ────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # Override .env paths to Docker-managed volumes
      QDRANT_URL: http://qdrant:6333
      AURACLE_DB_PATH: /data/auracle.sqlite
      AURACLE_MEM0_HISTORY_DB: /data/mem0/history.db
    volumes:
      - auracle_data:/data
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── React frontend (nginx + API proxy) ───────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  qdrant_data:
  auracle_data:
