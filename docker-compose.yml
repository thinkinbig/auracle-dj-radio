# Base stack — shared service definitions. No host ports; use an overlay:
#   dev:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d qdrant api
#   prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:

  qdrant:
    build:
      context: ./ops/qdrant
      dockerfile: Dockerfile
    image: auracle-qdrant:local
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env.docker
    environment:
      QDRANT_URL: http://qdrant:6333
      AURACLE_DB_PATH: /data/auracle.sqlite
      AURACLE_MEM0_HISTORY_DB: /data/mem0/history.db
    volumes:
      - auracle_data:/data
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

volumes:
  qdrant_data:
  auracle_data:
