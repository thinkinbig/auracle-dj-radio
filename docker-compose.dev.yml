# Dev infra for host-run services. `pnpm dev` runs Node/Go/Vite on the host and
# expects Qdrant at http://localhost:6333 for mem0 OSS.

services:
  qdrant:
    build:
      context: ./ops/qdrant
      dockerfile: Dockerfile
    image: auracle-qdrant:local
    restart: unless-stopped
    ports:
      - "127.0.0.1:${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  qdrant_data:
