# Dev: qdrant + api (tsx hot reload). Web on host → pnpm dev:web:docker (:5173 → api :3001).
# Local api without Docker: pnpm dev (:3000) + pnpm dev:web — ports do not overlap.
# Requires repo-root .env (see .env.example). Container paths below override local paths.

services:
  qdrant:
    build:
      context: ./ops/qdrant
      dockerfile: Dockerfile
    image: auracle-qdrant:local
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      QDRANT_URL: http://qdrant:6333
      AURACLE_DB_PATH: /data/auracle.sqlite
      AURACLE_MEM0_HISTORY_DB: /data/mem0/history.db
    ports:
      - "3001:3000"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src
      - auracle_data:/data
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

volumes:
  qdrant_data:
  auracle_data:
