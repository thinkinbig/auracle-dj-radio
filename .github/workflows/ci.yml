name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node (typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `packages/clients` etc. import `@auracle/shared` via its `dist/index.d.ts`.
      # On a fresh runner no dist exists yet, so typecheck must follow a build of
      # the depended-upon workspaces. Mirrors the root `predev` script.
      - name: Build workspace dependencies
        run: pnpm --filter @auracle/shared --filter @auracle/catalog --filter @auracle/clients build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      # Mirrors the Dockerfile build step; catches Vite/tsc build breakage in CI
      # rather than on the VM during deploy.
      - name: Build
        run: pnpm run build

  go:
    name: Go proxy (build · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/rt_llm_proxy
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/rt_llm_proxy/go.mod
          cache-dependency-path: services/rt_llm_proxy/go.sum

      - name: Verify modules
        run: go mod verify

      # `github.com/hraban/opus` is a cgo wrapper around system libopus.
      # ubuntu-latest runners ship without it; install it here just like the
      # services/rt_llm_proxy Dockerfile build stage does.
      - name: Install native deps (libopus)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libopus-dev libopusfile-dev pkg-config

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...
