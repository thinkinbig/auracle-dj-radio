# WebSocket upgrade map — must precede server {} block
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ── Static assets (immutable hash filenames) ──────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Session orchestration → agent-harness (REST) ─────────
    location /sessions {
        proxy_pass http://agent-harness:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── User auth → memory-service (REST) ─────────────────────
    location /auth {
        proxy_pass http://memory-service:3020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── WebRTC SDP offer → rt-llm-proxy (host network) ────────
    # Front-end posts to /proxy/?model=… ; the prefix is stripped so the proxy
    # sees its native offer path at /. Media (RTP/ICE) is peer-to-peer, not here.
    location /proxy/ {
        proxy_pass http://host.docker.internal:8090/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Catalog + media (static, baked from packages/catalog/data) ────
    # api+web merge: nginx serves the catalog/audio/images directly — no api service.

    # GET /catalog/tracks → bulk catalog JSON
    location = /catalog/tracks {
        default_type application/json;
        alias /usr/share/nginx/html/catalog/tracks.json;
    }

    # GET /tracks/:id/audio → media/tracks/<id>.mp3  (must precede the meta route)
    location ~ ^/tracks/([^/]+)/audio$ {
        default_type audio/mpeg;
        alias /usr/share/nginx/html/media/tracks/$1.mp3;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # GET /tracks/:id → single-track meta JSON (catalog cache fallback)
    location ~ ^/tracks/([^/]+)$ {
        default_type application/json;
        alias /usr/share/nginx/html/catalog/track/$1.json;
    }

    # GET /covers/:file , /artists/:file → images (served from root)
    location ~ ^/(covers|artists)/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
