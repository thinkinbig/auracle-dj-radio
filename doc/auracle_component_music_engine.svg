<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1080" viewBox="0 0 2000 1080" role="img" aria-labelledby="title desc">
  <title id="title">music-engine — ranking pipeline component diagram</title>
  <desc id="desc">Component diagram of the music-engine service. The four /plan_tracklist modes take two different Step-2 ordering paths: full and replan run HeuristicFlowModel.plan() followed by validateTracklist; provisional and extend order deterministically via buildProvisionalArc / buildExtendChain and skip both the flow model and validation. All paths share chooseNext (the per-slot picker) and stampPlanned. Local catalog and Spotify seeds are an exclusive source switch, never merged. Gemini appears once, outside the process.</desc>

  <defs>
    <pattern id="dotgrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1c2833"/>
    </pattern>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e0923c"/>
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#647588"/>
    </marker>
    <marker id="arrow-call" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6f83"/>
    </marker>
    <style>
      .eyebrow    { font: 700 10.5px "Menlo", monospace; fill: #e0923c; letter-spacing: 1.6px; }
      .doc-title  { font: 700 30px "Helvetica Neue", Arial, sans-serif; fill: #f2f6f9; }
      .doc-sub    { font: 400 13.5px "Helvetica Neue", Arial, sans-serif; fill: #8a9db0; }
      .rev        { font: 500 10.5px "Menlo", monospace; fill: #55697c; letter-spacing: 0.6px; }
      .row-label  { font: 700 11px "Menlo", monospace; fill: #55697c; letter-spacing: 2px; }
      .row-note   { font: 400 11px "Helvetica Neue", Arial, sans-serif; fill: #55697c; }
      .box-cat    { font: 700 9.5px "Menlo", monospace; fill: #6c8098; letter-spacing: 1px; }
      .box-cat-ext{ font: 700 9.5px "Menlo", monospace; fill: #7a7196; letter-spacing: 1px; }
      .box-name   { font: 700 17px "Menlo", monospace; fill: #eef3f7; }
      .box-name-sm{ font: 700 15px "Menlo", monospace; fill: #eef3f7; }
      .box-detail { font: 400 12px "Helvetica Neue", Arial, sans-serif; fill: #9aacbd; }
      .chip-label { font: 700 10px "Menlo", monospace; fill: #cdd9e3; }
      .tag-label  { font: 700 9.5px "Menlo", monospace; fill: #e0b07c; letter-spacing: 0.6px; }
      .tag-label-2{ font: 700 9.5px "Menlo", monospace; fill: #9fb0c2; letter-spacing: 0.6px; }
      .edge-label { font: 500 10.2px "Menlo", monospace; fill: #b7c3ce; }
      .edge-label-dim { font: 500 9.6px "Menlo", monospace; fill: #64788c; }
      .edge-label-call{ font: 500 9.6px "Menlo", monospace; fill: #718495; }
      .panel      { fill: #121b25; stroke: #2b3d50; stroke-width: 1.4; }
      .panel-hub  { fill: #121b25; stroke: #3a4f66; stroke-width: 1.8; }
      .panel-lane { fill: #101a26; stroke: #35506a; stroke-width: 1.6; }
      .panel-kernel { fill: #14202b; stroke: #5b6f83; stroke-width: 1.5; stroke-dasharray: 4 3; }
      .panel-ext  { fill: #0f1620; stroke: #3c4a5c; stroke-width: 1.3; stroke-dasharray: 5 4; }
      .boundary     { fill: rgba(120,150,180,0.02); stroke: #3a4f66; stroke-width: 1.6; }
      .boundary-ext { fill: rgba(140,120,170,0.02); stroke: #4a4560; stroke-width: 1.6; stroke-dasharray: 9 6; }
      .b-label-bg { fill: #0a1017; }
      .b-label    { font: 700 11px "Menlo", monospace; fill: #8fa3b8; letter-spacing: 1.5px; }
      .b-label-ext{ font: 700 11px "Menlo", monospace; fill: #9c8fb8; letter-spacing: 1.5px; }
      .chip       { fill: #0c131b; stroke: #263646; stroke-width: 1; }
      .tag-a      { fill: #241a10; stroke: #6b4d29; stroke-width: 1; }
      .tag-b      { fill: #131c26; stroke: #33485c; stroke-width: 1; }
      .divider    { stroke: #223140; stroke-width: 1; }
      .rail       { fill: none; stroke: #e0923c; stroke-width: 2.1; }
      .line-amber { fill: none; stroke: #e0923c; stroke-width: 2.1; marker-end: url(#arrow-amber); }
      .line-slate { fill: none; stroke: #647588; stroke-width: 1.6; stroke-dasharray: 6 5; marker-end: url(#arrow-slate); }
      .line-call  { fill: none; stroke: #5b6f83; stroke-width: 1.4; stroke-dasharray: 2 3; marker-end: url(#arrow-call); }
      .port-amber { fill: #e0923c; }
    </style>
  </defs>

  <rect x="0" y="0" width="2000" height="1080" fill="#0a1017"/>
  <rect x="0" y="0" width="2000" height="1080" fill="url(#dotgrid)"/>
  <rect x="0.75" y="0.75" width="1998.5" height="1078.5" fill="none" stroke="#1c2833" stroke-width="1.5"/>
  <path d="M20,20 L20,40 M20,20 L40,20" stroke="#2b3d50" stroke-width="1.3" fill="none"/>
  <path d="M1980,20 L1980,40 M1980,20 L1960,20" stroke="#2b3d50" stroke-width="1.3" fill="none"/>
  <path d="M20,1060 L20,1040 M20,1060 L40,1060" stroke="#2b3d50" stroke-width="1.3" fill="none"/>
  <path d="M1980,1060 L1980,1040 M1980,1060 L1960,1060" stroke="#2b3d50" stroke-width="1.3" fill="none"/>

  <text class="eyebrow" x="60" y="46">BOUNDARY DIAGRAM — SERVICE INTERNALS</text>
  <text class="doc-title" x="60" y="78">music-engine — ranking pipeline</text>
  <text class="doc-sub" x="60" y="102">full &amp; replan run HeuristicFlowModel + validation; provisional &amp; extend order deterministically and skip both. All share chooseNext.</text>
  <text class="doc-sub" x="60" y="121">Local catalog vs Spotify seeds is an exclusive source switch, never one merged pool. Gemini appears once, outside the process.</text>
  <text class="rev" x="1940" y="68" text-anchor="end">DOC 04a · MUSIC-ENGINE</text>
  <text class="rev" x="1940" y="84" text-anchor="end">REV 2026-07</text>
  <line class="divider" x1="60" y1="136" x2="1940" y2="136"/>

  <!-- PROCESS boundary -->
  <rect class="boundary" x="40" y="150" width="1600" height="842" rx="8"/>
  <rect class="b-label-bg" x="60" y="142" width="270" height="18"/>
  <text class="b-label" x="66" y="156">MUSIC-ENGINE · PROCESS</text>

  <!-- EXTERNAL boundary -->
  <rect class="boundary-ext" x="1680" y="150" width="280" height="842" rx="8"/>
  <rect class="b-label-bg" x="1700" y="142" width="130" height="18"/>
  <text class="b-label-ext" x="1706" y="156">EXTERNAL</text>

  <!-- ============ ENTRY ROW ============ -->
  <text class="row-label" x="60" y="196">ENTRY POINTS</text>

  <rect class="panel" x="60" y="206" width="280" height="116" rx="3"/>
  <text class="box-cat" x="84" y="232">ROUTE</text>
  <text class="box-name" x="84" y="256">/search_catalog</text>
  <line class="divider" x1="84" y1="268" x2="316" y2="268"/>
  <text class="box-detail" x="84" y="292">Retrieval only, no ordering</text>

  <rect class="panel-hub" x="380" y="206" width="1000" height="116" rx="3"/>
  <text class="box-cat" x="404" y="232">ROUTE</text>
  <text class="box-name" x="404" y="256">/plan_tracklist</text>
  <g>
    <rect class="chip" x="404" y="274" width="150" height="34" rx="2"/>
    <text class="chip-label" x="418" y="296">provisional</text>
    <rect class="chip" x="566" y="274" width="150" height="34" rx="2"/>
    <text class="chip-label" x="580" y="296">full</text>
    <rect class="chip" x="728" y="274" width="150" height="34" rx="2"/>
    <text class="chip-label" x="742" y="296">replan</text>
    <rect class="chip" x="890" y="274" width="150" height="34" rx="2"/>
    <text class="chip-label" x="904" y="296">extend</text>
  </g>
  <text class="box-detail" x="1054" y="296">mode picks the ordering path</text>

  <rect class="panel" x="1420" y="206" width="200" height="116" rx="3"/>
  <text class="box-cat" x="1440" y="232">LRU CACHE</text>
  <text class="box-name" x="1440" y="256">Plan Cache</text>
  <line class="divider" x1="1440" y1="268" x2="1600" y2="268"/>
  <text class="box-detail" x="1440" y="292">full mode, no seeds</text>

  <!-- ============ STEP 1 — CANDIDATES ============ -->
  <text class="row-label" x="60" y="366">STEP 1 — CANDIDATES</text>
  <text class="row-note" x="288" y="366">shared by every mode · exactly one source fills the pool</text>

  <rect class="panel" x="60" y="376" width="480" height="140" rx="3"/>
  <text class="box-cat" x="84" y="402">flow/retrieval</text>
  <text class="box-name" x="84" y="428">retrieveCandidates()</text>
  <line class="divider" x1="84" y1="440" x2="516" y2="440"/>
  <text class="box-detail" x="84" y="464">Buckets catalog by arc energy</text>
  <text class="box-detail" x="84" y="484">Ranks by scene, genre, taste fit</text>
  <text class="box-detail" x="84" y="504">Runs only when no seeds</text>

  <rect class="panel" x="580" y="376" width="480" height="140" rx="3"/>
  <text class="box-cat" x="604" y="402">flow/plan.ts</text>
  <text class="box-name" x="604" y="428">buildSeedContext()</text>
  <line class="divider" x1="604" y1="440" x2="1036" y2="440"/>
  <text class="box-detail" x="604" y="464">Exact catalog reuse first (free)</text>
  <text class="box-detail" x="604" y="484">Unmatched → resolveSeeds</text>
  <text class="box-detail" x="604" y="504">Seeds present → sole source</text>

  <!-- resolveSeeds lives outside the process boundary -->
  <rect class="panel-ext" x="1700" y="376" width="260" height="140" rx="3"/>
  <text class="box-cat-ext" x="1718" y="402">GEMINI</text>
  <text class="box-name" x="1718" y="428">resolveSeeds()</text>
  <line class="divider" x1="1718" y1="440" x2="1942" y2="440"/>
  <text class="box-detail" x="1718" y="464">Infers energy + voicing</text>
  <text class="box-detail" x="1718" y="484">Memoized by uri</text>
  <text class="box-detail" x="1718" y="504">provisional skips it</text>

  <!-- ============ STEP 2 — SEQUENCING ============ -->
  <text class="row-label" x="60" y="572">STEP 2 — SEQUENCING</text>
  <text class="row-note" x="288" y="572">two ordering paths, split by mode</text>

  <!-- Lane A: full + replan -->
  <rect class="panel-lane" x="60" y="584" width="720" height="104" rx="3"/>
  <text class="box-cat" x="84" y="610">flow/llm/heuristic-flow.ts</text>
  <rect class="tag-a" x="600" y="596" width="156" height="24" rx="2"/>
  <text class="tag-label" x="614" y="612">full · replan</text>
  <text class="box-name" x="84" y="642">HeuristicFlowModel.plan()</text>
  <line class="divider" x1="84" y1="656" x2="756" y2="656"/>
  <text class="box-detail" x="84" y="678">Walks mood-arc energy targets — one pick per slot, no model call</text>

  <!-- Lane B: provisional + extend -->
  <rect class="panel-lane" x="800" y="584" width="760" height="104" rx="3"/>
  <text class="box-cat" x="824" y="610">flow/plan.ts</text>
  <rect class="tag-b" x="1372" y="596" width="188" height="24" rx="2"/>
  <text class="tag-label-2" x="1386" y="612">provisional · extend</text>
  <text class="box-name-sm" x="824" y="642">buildProvisionalArc() · buildExtendChain()</text>
  <line class="divider" x1="824" y1="656" x2="1536" y2="656"/>
  <text class="box-detail" x="824" y="678">Deterministic arc / rolling chain — no flow model, no validation</text>

  <!-- Shared kernel: chooseNext -->
  <rect class="panel-kernel" x="520" y="708" width="560" height="60" rx="3"/>
  <text class="box-cat" x="544" y="730">flow/selection · shared kernel</text>
  <text class="box-name-sm" x="544" y="754">chooseNext()</text>
  <text class="box-detail" x="700" y="754">nearest-energy, adjacency-legal pick</text>

  <!-- ============ STEP 3 — SAFETY NET + OUTPUT ============ -->
  <text class="row-label" x="60" y="806">SAFETY NET + OUTPUT</text>

  <rect class="panel" x="60" y="816" width="720" height="118" rx="3"/>
  <text class="box-cat" x="84" y="842">flow/validation</text>
  <rect class="tag-a" x="556" y="828" width="200" height="24" rx="2"/>
  <text class="tag-label" x="570" y="844">full · replan only</text>
  <text class="box-name" x="84" y="874">validateTracklist()</text>
  <line class="divider" x1="84" y1="886" x2="756" y2="886"/>
  <text class="box-detail" x="84" y="910">Flags tempo / energy / genre jumps — no repair loop</text>

  <rect class="panel" x="800" y="816" width="760" height="118" rx="3"/>
  <text class="box-cat" x="824" y="842">flow/plan.ts</text>
  <rect class="tag-b" x="1428" y="828" width="132" height="24" rx="2"/>
  <text class="tag-label-2" x="1442" y="844">all modes</text>
  <text class="box-name" x="824" y="874">stampPlanned()</text>
  <line class="divider" x1="824" y1="886" x2="1536" y2="886"/>
  <text class="box-detail" x="824" y="910">Merges metadata + voicing into PlannedTrack</text>

  <!-- response -->
  <text class="box-detail" x="60" y="966">→ RESPONSE · agent-harness · tracklist, violations, candidates</text>

  <!-- ============ EDGES ============ -->
  <!-- entry → step 1 -->
  <path class="line-amber" d="M200,322 L200,376"/>
  <rect class="port-amber" x="197" y="319" width="6" height="6"/>
  <text class="edge-label-dim" x="212" y="342">/search_catalog only</text>

  <path class="line-amber" d="M820,322 L820,376"/>
  <rect class="port-amber" x="817" y="319" width="6" height="6"/>
  <text class="edge-label-dim" x="832" y="344">all /plan_tracklist modes</text>

  <!-- exclusive branch: seeds absent → retrieveCandidates runs -->
  <path class="line-amber" d="M580,458 L540,458"/>
  <text class="edge-label" x="560" y="448" text-anchor="middle">no seeds</text>
  <rect class="port-amber" x="577" y="455" width="6" height="6"/>

  <!-- plan cache (full mode, read/write) -->
  <path class="line-amber" d="M1380,256 L1420,256"/>
  <rect class="port-amber" x="1377" y="253" width="6" height="6"/>

  <!-- resolveSeeds across the boundary -->
  <path class="line-slate" d="M1060,432 L1700,432"/>
  <text class="edge-label-dim" x="1300" y="424">unmatched seeds</text>
  <path class="line-slate" d="M1700,466 L1060,466"/>
  <text class="edge-label-dim" x="1300" y="484">energy + voicing</text>

  <!-- step 1 → candidate pool rail -->
  <path class="line-amber" d="M300,516 L300,544"/>
  <rect class="port-amber" x="297" y="513" width="6" height="6"/>
  <text class="edge-label" x="216" y="536">catalog pool</text>

  <path class="line-amber" d="M820,516 L820,544"/>
  <rect class="port-amber" x="817" y="513" width="6" height="6"/>
  <text class="edge-label" x="836" y="536">seed pool</text>

  <path class="rail" d="M300,544 L1180,544"/>
  <text class="edge-label-dim" x="620" y="560">one source only — local XOR Spotify, never merged</text>

  <!-- pool → lane A (full/replan) and lane B (provisional/extend) -->
  <path class="line-amber" d="M420,544 L420,584"/>
  <rect class="port-amber" x="417" y="541" width="6" height="6"/>

  <path class="line-amber" d="M1180,544 L1180,584"/>
  <rect class="port-amber" x="1177" y="541" width="6" height="6"/>

  <!-- lanes call the shared chooseNext kernel -->
  <path class="line-call" d="M700,688 L640,708"/>
  <path class="line-call" d="M900,688 L960,708"/>
  <text class="edge-label-call" x="800" y="702" text-anchor="middle">picks each slot</text>

  <!-- lane A → validate → stamp -->
  <path class="line-amber" d="M260,688 L260,816"/>
  <rect class="port-amber" x="257" y="685" width="6" height="6"/>

  <path class="line-amber" d="M780,875 L800,875"/>
  <rect class="port-amber" x="777" y="872" width="6" height="6"/>

  <!-- lane B → stamp (bypasses validation) -->
  <path class="line-amber" d="M1300,688 L1300,816"/>
  <rect class="port-amber" x="1297" y="685" width="6" height="6"/>
  <text class="edge-label" x="1312" y="756">no validation</text>

  <!-- stamp → response -->
  <path class="line-amber" d="M1180,934 L1180,958"/>
  <rect class="port-amber" x="1177" y="931" width="6" height="6"/>

  <!-- ============ LEGEND ============ -->
  <line class="divider" x1="60" y1="1010" x2="1940" y2="1010"/>
  <g transform="translate(60,1038)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#e0923c" stroke-width="2.1" marker-end="url(#arrow-amber)"/>
    <text class="box-detail" x="40" y="4">deterministic data flow</text>
    <line x1="250" y1="0" x2="280" y2="0" stroke="#5b6f83" stroke-width="1.4" stroke-dasharray="2 3" marker-end="url(#arrow-call)"/>
    <text class="box-detail" x="290" y="4">calls shared primitive (chooseNext)</text>
    <line x1="600" y1="0" x2="630" y2="0" stroke="#647588" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arrow-slate)"/>
    <text class="box-detail" x="640" y="4">crosses the process boundary</text>
  </g>
</svg>
