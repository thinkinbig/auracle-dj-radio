# Prod / demo: qdrant + api + web. Only web is published on the host.
# Requires repo-root .env (see .env.example). Circuit breaker defaults ON via NODE_ENV=production.

services:
  qdrant:
    build:
      context: ./ops/qdrant
      dockerfile: Dockerfile
    image: auracle-qdrant:local
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      QDRANT_URL: http://qdrant:6333
      AURACLE_DB_PATH: /data/auracle.sqlite
      AURACLE_MEM0_HISTORY_DB: /data/mem0/history.db
    volumes:
      - auracle_data:/data
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  qdrant_data:
  auracle_data:
