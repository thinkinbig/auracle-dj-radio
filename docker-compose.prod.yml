# Prod / demo: qdrant + music-engine + memory-service + agent-harness + rt-llm-proxy + web.
# web (nginx) serves the SPA *and* the static catalog/audio/images (api+web merge).
# Only web (host :8080) and the host-networked proxy are reachable from outside.
# Requires repo-root .env (see .env.example). Circuit breaker defaults ON via NODE_ENV=production.

services:
  qdrant:
    build:
      context: ./ops/qdrant
      dockerfile: Dockerfile
    image: auracle-qdrant:local
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  music-engine:
    build:
      context: .
      dockerfile: services/music-engine/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      MUSIC_ENGINE_PORT: "3010"
      MUSIC_ENGINE_DB_PATH: /data/auracle-catalog.sqlite
      CATALOG_DATA_DIR: /app/data
      AURACLE_EMBEDDER: hash
    volumes:
      - music_engine_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3010/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  memory-service:
    build:
      context: .
      dockerfile: services/memory-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      MEMORY_SERVICE_PORT: "3020"
      MEMORY_EVENTS_DB_PATH: /data/auracle-events.sqlite
      AURACLE_MEM0_HISTORY_DB: /data/mem0/history.db
      QDRANT_URL: http://qdrant:6333
    volumes:
      - memory_service_data:/data
    depends_on:
      qdrant:
        condition: service_healthy

  agent-harness:
    build:
      context: .
      dockerfile: services/agent-harness/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      AGENT_HARNESS_PORT: "3030"
      MEMORY_SERVICE_URL: http://memory-service:3020
      MUSIC_ENGINE_URL: http://music-engine:3010
      # Proxy runs on the host network (WebRTC) — reach it via the host gateway.
      PROXY_URL: http://host.docker.internal:8090
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Loopback-only publish so the host-networked proxy can reach Lane-1 tools.
    ports:
      - "127.0.0.1:3030:3030"
    depends_on:
      memory-service:
        condition: service_started
      music-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3030/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  rt-llm-proxy:
    build:
      context: ./services/rt_llm_proxy
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.io,direct}
    # Namespaced so it never collides with a standalone rt_llm_proxy:latest image.
    image: auracle-rt-llm-proxy:local
    restart: unless-stopped
    # WebRTC media needs host-reachable ICE candidates — on a Docker bridge pion
    # would advertise an unreachable 172.x IP on a random UDP port. Host network
    # lets it use the host's real interfaces (single-host / LAN demo).
    network_mode: host
    env_file: .env
    command: ["-addr", ":8090", "-memory-service", "http://localhost:3030"]
    depends_on:
      agent-harness:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    # nginx reverse-proxies /proxy → the host-networked rt-llm-proxy.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      agent-harness:
        condition: service_started
      memory-service:
        condition: service_started
      rt-llm-proxy:
        condition: service_started

volumes:
  qdrant_data:
  music_engine_data:
  memory_service_data:
