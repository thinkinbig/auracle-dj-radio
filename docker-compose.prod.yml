# Prod / demo: music-engine + profile-service + agent-harness + rt-llm-proxy + web.
# web (nginx) serves the SPA *and* the static catalog/audio/images (api+web merge).
# Web is externally reachable on :8080. The proxy uses host networking so its
# host ICE candidates and random WebRTC UDP media ports are browser-reachable.
# Requires repo-root .env (see .env.example). Circuit breaker defaults ON via NODE_ENV=production.

services:
  music-engine:
    build:
      context: .
      dockerfile: services/music-engine/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      MUSIC_ENGINE_PORT: "3010"
      # Catalog is loaded into memory from the manifest baked into the image
      # (/app/data) — no persistent DB, so no volume.
      CATALOG_DATA_DIR: /app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3010/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  profile-service:
    build:
      context: .
      dockerfile: services/profile-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PROFILE_SERVICE_PORT: "3020"
      PROFILE_EVENTS_STORE: supabase
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY:?SUPABASE_SECRET_KEY is required for production profile events}
    # Host-networked rt-llm-proxy verifies the browser token through this
    # loopback-only mapping; it is not exposed to the public network.
    ports:
      - "127.0.0.1:3020:3020"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3020/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  agent-harness:
    build:
      context: .
      dockerfile: services/agent-harness/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      AGENT_HARNESS_PORT: "3030"
      PROFILE_SERVICE_URL: http://profile-service:3020
      MUSIC_ENGINE_URL: http://music-engine:3010
      # The WebRTC proxy is host-networked so it can advertise host ICE candidates.
      PROXY_URL: http://host.docker.internal:8090
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:3030:3030"
    depends_on:
      profile-service:
        condition: service_healthy
      music-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3030/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  rt-llm-proxy:
    build:
      context: ./services/rt_llm_proxy
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.io,direct}
    # Namespaced so it never collides with a standalone rt_llm_proxy:latest image.
    image: auracle-rt-llm-proxy:local
    restart: unless-stopped
    # No STUN/TURN is configured. Bridge networking would advertise an
    # unreachable 172.x host candidate and random UDP media ports.
    network_mode: host
    env_file: .env
    environment:
      PROXY_AUTH_URL: http://localhost:3020
      PROXY_HARNESS_URL: http://localhost:3030
    command: ["-addr", ":8090", "-harness-url", "http://localhost:3030", "-auth-url", "http://localhost:3020"]
    depends_on:
      agent-harness:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    # nginx's control-plane proxy reaches the host-networked WebRTC proxy.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      agent-harness:
        condition: service_started
      profile-service:
        condition: service_healthy
      rt-llm-proxy:
        condition: service_started
