# Prod / demo: music-engine + profile-service + agent-harness + rt-llm-proxy + web.
# web (nginx) serves the SPA *and* the static catalog/audio/images (api+web merge).
# Only web (host :8080) and the host-networked proxy are reachable from outside.
# Requires repo-root .env (see .env.example). Circuit breaker defaults ON via NODE_ENV=production.

services:
  music-engine:
    build:
      context: .
      dockerfile: services/music-engine/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      MUSIC_ENGINE_PORT: "3010"
      # Catalog is loaded into memory from the manifest baked into the image
      # (/app/data) — no persistent DB, so no volume.
      CATALOG_DATA_DIR: /app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3010/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  profile-service:
    build:
      context: .
      dockerfile: services/profile-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PROFILE_SERVICE_PORT: "3020"
      PROFILE_EVENTS_DB_PATH: /data/auracle-events.sqlite
    ports:
      - "127.0.0.1:3020:3020"
    volumes:
      - profile_service_data:/data

  agent-harness:
    build:
      context: .
      dockerfile: services/agent-harness/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      AGENT_HARNESS_PORT: "3030"
      PROFILE_SERVICE_URL: http://profile-service:3020
      MUSIC_ENGINE_URL: http://music-engine:3010
      # Proxy runs on the host network (WebRTC) — reach it via the host gateway.
      PROXY_URL: http://host.docker.internal:8090
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Loopback-only publish so the host-networked proxy can reach Lane-1 tools.
    ports:
      - "127.0.0.1:3030:3030"
    depends_on:
      profile-service:
        condition: service_started
      music-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3030/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  rt-llm-proxy:
    build:
      context: ./services/rt_llm_proxy
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.io,direct}
    # Namespaced so it never collides with a standalone rt_llm_proxy:latest image.
    image: auracle-rt-llm-proxy:local
    restart: unless-stopped
    # WebRTC media needs host-reachable ICE candidates — on a Docker bridge pion
    # would advertise an unreachable 172.x IP on a random UDP port. Host network
    # lets it use the host's real interfaces (single-host / LAN demo).
    network_mode: host
    env_file: .env
    environment:
      PROXY_AUTH_URL: http://localhost:3020
    command: ["-addr", ":8090", "-harness-url", "http://localhost:3030", "-auth-url", "http://localhost:3020"]
    depends_on:
      agent-harness:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    # nginx reverse-proxies /proxy → the host-networked rt-llm-proxy.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      agent-harness:
        condition: service_started
      profile-service:
        condition: service_started
      rt-llm-proxy:
        condition: service_started

volumes:
  profile_service_data:
